services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prisma_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATA_DIR=/app/data
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: prisma_frontend
    working_dir: /app/src/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: prisma_jupyter
    ports:
      - "8888:8888"
    volumes:
      # Monta apenas os dados — nunca o repositório inteiro (que inclui o .env com segredos)
      - ./data:/home/jovyan/work/data
    environment:
      - JUPYTER_ENABLE_LAB=yes
      # Sem fallback hardcoded: defina JUPYTER_TOKEN no .env (o quick_start.sh gera um automaticamente)
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:?Defina JUPYTER_TOKEN no arquivo .env}
    restart: unless-stopped
